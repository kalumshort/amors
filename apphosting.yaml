# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Cloud Run scaling for the Next.js server
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets available at build & runtime.
# Secrets must first be created in Cloud Secret Manager, e.g.:
#   firebase apphosting:secrets:set MY_SECRET
# (none required — the site has no server-side integrations)
